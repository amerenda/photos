<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Gallery</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="gallery-body dark">

  <header class="site-header">
    <span class="site-title">Private</span>
    <a href="/logout" class="header-link">Lock</a>
  </header>

  {{if .Photos}}
  <div class="photo-grid" id="gallery">
    {{range .Photos}}
    <div class="grid-item" onclick="openLightbox('/photos/secret/{{.}}')">
      <img src="/photos/secret/{{.}}" alt="" loading="lazy">
    </div>
    {{end}}
  </div>
  {{else}}
  <div class="empty-state">No photos in private album.</div>
  {{end}}

  <!-- Inline lightbox overlay -->
  <div id="lb" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);cursor:zoom-out;align-items:center;justify-content:center;">
    <img id="lb-img" src="" alt="" style="max-width:95vw;max-height:92vh;object-fit:contain;border-radius:4px;">
    <button onclick="document.getElementById('lb').style.display='none'" style="position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1">&#x2715;</button>
  </div>
  <script>
    function openLightbox(src) {
      const lb = document.getElementById('lb');
      document.getElementById('lb-img').src = src;
      lb.style.display = 'flex';
    }
    document.getElementById('lb').addEventListener('click', function(e) {
      if (e.target === this) this.style.display = 'none';
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') document.getElementById('lb').style.display = 'none';
    });
  </script>
</body>
</html>
