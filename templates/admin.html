<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Gallery</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="admin-body">

  <header class="site-header">
    <span class="site-title">Admin</span>
    <span class="header-user">{{.User}}</span>
    <a href="/logout" class="header-link">Sign out</a>
  </header>

  <main class="admin-main">

    <!-- Upload -->
    <section class="admin-section">
      <h2>Upload Photo</h2>
      <form id="upload-form" enctype="multipart/form-data">
        <select name="album" id="album-select" class="admin-select">
          <option value="public">Public</option>
          <option value="secret">Private</option>
        </select>
        <input type="file" name="file" id="file-input" accept="image/*" class="admin-file-input" multiple>
        <button type="submit" class="admin-btn" id="upload-btn">Upload</button>
      </form>
      <div id="progress-wrap" class="progress-wrap" style="display:none">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <span id="progress-label" class="progress-label">0%</span>
      </div>
      <p id="upload-status" class="upload-status"></p>
    </section>

    <!-- Public album -->
    <section class="admin-section">
      <h2>Public Album <span class="photo-count">({{len .PublicPhotos}})</span></h2>
      {{if .PublicPhotos}}
      <div class="admin-grid">
        {{range .PublicPhotos}}
        <div class="admin-thumb" id="pub-{{.}}">
          <img src="/photos/public/{{.}}" alt="{{.}}" loading="lazy">
          <div class="admin-thumb-name">{{.}}</div>
          <button class="delete-btn" onclick="deletePhoto('public','{{.}}')">Delete</button>
        </div>
        {{end}}
      </div>
      {{else}}
      <p class="empty-note">No photos.</p>
      {{end}}
    </section>

    <!-- Secret album -->
    <section class="admin-section">
      <h2>Private Album <span class="photo-count">({{len .SecretPhotos}})</span></h2>
      {{if .SecretPhotos}}
      <div class="admin-grid">
        {{range .SecretPhotos}}
        <div class="admin-thumb" id="sec-{{.}}">
          <img src="/photos/secret/{{.}}" alt="{{.}}" loading="lazy">
          <div class="admin-thumb-name">{{.}}</div>
          <button class="delete-btn" onclick="deletePhoto('secret','{{.}}')">Delete</button>
        </div>
        {{end}}
      </div>
      {{else}}
      <p class="empty-note">No photos.</p>
      {{end}}
    </section>

  </main>

  <script>
    // Upload via XHR for progress events
    document.getElementById('upload-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const status   = document.getElementById('upload-status');
      const wrap     = document.getElementById('progress-wrap');
      const fill     = document.getElementById('progress-fill');
      const label    = document.getElementById('progress-label');
      const btn      = document.getElementById('upload-btn');
      const form     = new FormData(e.target);

      status.textContent = '';
      wrap.style.display = 'flex';
      fill.style.width = '0%';
      label.textContent = '0%';
      btn.disabled = true;

      const xhr = new XMLHttpRequest();

      xhr.upload.onprogress = (ev) => {
        if (!ev.lengthComputable) return;
        const pct = Math.round(ev.loaded / ev.total * 100);
        fill.style.width = pct + '%';
        label.textContent = pct + '%';
      };

      xhr.onload = () => {
        btn.disabled = false;
        wrap.style.display = 'none';
        if (xhr.status >= 200 && xhr.status < 300) {
          status.textContent = 'Done — reload to see new photos.';
          status.style.color = '#4caf50';
        } else {
          status.textContent = 'Error ' + xhr.status + ': ' + xhr.responseText;
          status.style.color = '#f44336';
        }
      };

      xhr.onerror = () => {
        btn.disabled = false;
        wrap.style.display = 'none';
        status.textContent = 'Network error — check file size and try again.';
        status.style.color = '#f44336';
      };

      xhr.open('POST', '/admin/upload');
      xhr.send(form);
    });

    // Delete
    async function deletePhoto(album, name) {
      if (!confirm('Delete ' + name + '?')) return;
      const r = await fetch('/admin/photo?album=' + encodeURIComponent(album) + '&name=' + encodeURIComponent(name), {
        method: 'DELETE',
      });
      if (r.ok) {
        const prefix = album === 'public' ? 'pub-' : 'sec-';
        document.getElementById(prefix + name)?.remove();
      } else {
        alert('Delete failed: ' + await r.text());
      }
    }
  </script>
</body>
</html>
